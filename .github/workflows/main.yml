name: Flutter CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
        flutter-version: 3.41.x
    - name: Install dependencies
      run: flutter pub get
    - name: Run tests
      run: make test flutter=flutter
    - name: Dirty check
      run: make dirty-check flutter=flutter
    - name: Format check
      run: make format-check dart=dart

  l10n-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install tools
      run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends aspell-en
    - name: Run l10n check
      env:
        LC_ALL: C.utf8
      run: make l10n-check
